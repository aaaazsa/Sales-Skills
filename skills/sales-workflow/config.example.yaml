schema_version: "1.0"
implementation_id: example-sales-implementation

setup:
  status: incomplete
  project_folder: null
  requested_features: [prospecting]

contact_list:
  enabled: null
  mode: pending
  path: null
  discovery:
    extensions: [.xlsx, .xls, .csv, .tsv]
    filename_keywords: [contact, customer, client, lead, prospect]
  sync_timing: after_list_complete
  allowed_sync_timings: [immediately_after_verified_send, after_list_complete]
  deduplicate_by: [company, email]
  list_completion_required: true
  final_decline_confirmed: false

company: {name: null, website: null}
sender: {name: null, title: null, email: null, signature: null}
products: {catalog: []}
industry: {target_markets: [], target_channels: [], research_sources: []}

lead_retention:
  email_requirements:
    require_contact_email: true
    preferred_types: [named_decision_maker, sales, business, partnerships, commercial, procurement, info, enquiry, contact]
    excluded_default_types: [support, service, help]
    allow_support_only: false
  decision_maker_research:
    enabled: true
    fallback_when: [support_only, generic_contact_only, no_official_sales_email]
    target_roles: [Founder, CEO, Managing Director, Commercial Director, Head of Sales, Purchasing Manager, Category Manager, Buyer, Business Development]
    public_sources: [official_team_page, official_about_page, official_partner_page, linkedin, trade_association, conference_page, reputable_business_directory]
    require_role_source: true
    never_guess_email: true
  descriptive_fields: [company_name, website, market, channel, source_url, contact_name, contact_role, email_type, contact_source_url, role_source_url, contact_confidence]
  priority_labels: []

manual_contact_lookup:
  enabled: true
  trigger_status: decision_maker_found_no_email
  delivery: customer_chat
  send_only_when_authorized: true
  required_fields: [company_name, website, contact_name, contact_role, company_association, contact_source_url, role_source_url]
  customer_request: Please help provide or locate a reliable professional email address for this decision-maker. The system will not guess an email format or send automatically.

email:
  enabled: null
  provider: agent.qq.com
  connection_status: pending
  authorized_account: null
  communication_rules: []
  template: {version: "1.0", subject: "", body: ""}

crm: {tracker_path: null, source_sheet: null, field_mapping: {}}
reporting: {weekly_report_path: null}
tools:
  research: {adapter: null}
  email: {adapter: null}
  records: {adapter: null}
  checkpoint: {adapter: null}
  report: {adapter: null}
runtime: {run_store: ./runtime/checkpoints, retry_limit: 1, timeout_seconds: 60}
evaluation: {enabled: true, event_store: ./runtime/evaluation-events, capture_cost: true, capture_duration: true, capture_human_intervention: true}
